name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt scikit-learn
      - run: python -m pytest -q
      - name: Backtest gate (synthetic)
        run: |
          python3 - <<'PY'
          from models.backtest import run_backtest
          from tests.synthetic_data import generate_synthetic_history
          h = generate_synthetic_history(n_snapshots=80)
          r = run_backtest(h, lookback_days=30)
          assert r.n_forecasts > 0, 'no forecasts'
          assert r.mae_delta_gex < 1.0, f'MAE too high: {r.mae_delta_gex}'
          print('backtest ok', r.to_dict())
          PY
