<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GEX Market Agent</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --user: #1e3a5f;
      --bot: #14201a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
    header .status { font-size: 0.8rem; color: var(--muted); }
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 0;
    }
    aside {
      border-right: 1px solid var(--border);
      padding: 1rem;
      overflow-y: auto;
      background: #0d1526;
    }
    aside label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 0.35rem; }
    aside select, aside input {
      width: 100%;
      margin-bottom: 0.75rem;
      padding: 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }
    .prompt-btn {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 0.5rem;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 0.78rem;
      cursor: pointer;
    }
    .prompt-btn:hover { border-color: var(--accent); }
    main {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.92rem;
      white-space: pre-wrap;
    }
    .msg.user { align-self: flex-end; background: var(--user); }
    .msg.assistant { align-self: flex-start; background: var(--bot); border: 1px solid var(--border); }
    .msg-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.35rem; }
    .msg-meta .tag { display: inline-block; background: var(--panel); padding: 0.1rem 0.4rem; border-radius: 4px; margin-right: 0.35rem; }
    .feedback { margin-top: 0.4rem; }
    .feedback button { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 0.15rem 0.5rem; cursor: pointer; margin-right: 0.35rem; font-size: 0.75rem; }
    .composer {
      border-top: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      gap: 0.5rem;
      background: var(--panel);
    }
    #input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      resize: none;
      min-height: 48px;
      max-height: 120px;
    }
    button.send {
      padding: 0 1.25rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    button.send:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #f87171; font-size: 0.85rem; padding: 0 1.25rem 0.5rem; }
    .warn { color: #fbbf24; font-size: 0.85rem; padding: 0 1.25rem 0.5rem; }
    .msg.thinking { align-self: flex-start; background: var(--panel); border: 1px dashed var(--border); color: var(--muted); font-style: italic; }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .msg.thinking { animation: pulse 1.5s ease-in-out infinite; }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      aside { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>GEX Market Agent</h1>
      <div class="status" id="status">Connecting…</div>
    </div>
  </header>
  <div class="layout">
    <aside>
      <label for="ticker">Ticker</label>
      <select id="ticker"></select>
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="fast" selected>Fast (1 API call)</option>
        <option value="deep">Deep (tools + two-pass)</option>
        <option value="quant">Quant only (no LLM)</option>
      </select>
      <label><input type="checkbox" id="stream" checked /> Stream response</label>
      <label for="apiKey">API key (if required)</label>
      <input id="apiKey" type="password" placeholder="X-API-Key (optional)" />
      <label>Suggested prompts</label>
      <div id="prompts"></div>
    </aside>
    <main>
      <div id="messages"></div>
      <div class="warn" id="warn"></div>
      <div class="error" id="error"></div>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Ask about regime, flip, walls, forecasts…"></textarea>
        <button class="send" id="send">Send</button>
      </div>
    </main>
  </div>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const errorEl = document.getElementById('error');
    const warnEl = document.getElementById('warn');
    const statusEl = document.getElementById('status');
    const tickerEl = document.getElementById('ticker');
    const apiKeyEl = document.getElementById('apiKey');
    const promptsEl = document.getElementById('prompts');
    const modeEl = document.getElementById('mode');
    const streamEl = document.getElementById('stream');

    let history = [];
    let thinkingEl = null;
    let lastReply = '';
    let lastSnapshotTs = null;
    const sessionId = localStorage.getItem('gex_session_id') || ('s-' + Math.random().toString(36).slice(2, 10));
    localStorage.setItem('gex_session_id', sessionId);
    const CHAT_TIMEOUT_MS = 120000;

    function formatApiError(detail) {
      if (!detail) return 'Request failed';
      if (typeof detail === 'string') return detail;
      if (Array.isArray(detail)) return detail.map(x => x.msg || JSON.stringify(x)).join('; ');
      return String(detail);
    }

    function setThinking(on) {
      if (on && !thinkingEl) {
        thinkingEl = document.createElement('div');
        thinkingEl.className = 'msg assistant thinking';
        thinkingEl.textContent = 'Analyzing GEX context…';
        messagesEl.appendChild(thinkingEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } else if (!on && thinkingEl) {
        thinkingEl.remove();
        thinkingEl = null;
      }
    }

    function headers() {
      const h = { 'Content-Type': 'application/json' };
      const key = apiKeyEl.value.trim() || localStorage.getItem('gex_api_key');
      if (key) h['X-API-Key'] = key;
      return h;
    }

    function addMessage(role, content, meta, feedback) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const textNode = document.createTextNode(content);
      div.appendChild(textNode);
      if (meta && role === 'assistant') {
        const metaEl = document.createElement('div');
        metaEl.className = 'msg-meta';
        metaEl.innerHTML = meta;
        div.appendChild(metaEl);
      }
      if (feedback && role === 'assistant') {
        const fb = document.createElement('div');
        fb.className = 'feedback';
        const up = document.createElement('button');
        up.textContent = '👍';
        up.onclick = () => sendFeedback(1);
        const down = document.createElement('button');
        down.textContent = '👎';
        down.onclick = () => sendFeedback(-1);
        fb.appendChild(up);
        fb.appendChild(down);
        div.appendChild(fb);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendFeedback(rating) {
      try {
        await fetch(`/llm/feedback/${tickerEl.value}`, {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({
            session_id: sessionId,
            rating,
            message: history.filter(m => m.role === 'user').slice(-1)[0]?.content,
            reply: lastReply,
            snapshot_ts: lastSnapshotTs,
          }),
        });
      } catch (_) {}
    }

    function formatMeta(d) {
      const tags = [];
      if (d.from_cache) tags.push('<span class="tag">cached</span>');
      if (d.two_pass) tags.push('<span class="tag">two-pass</span>');
      if (d.tools_used && d.tools_used.length) {
        tags.push('<span class="tag">tools: ' + d.tools_used.join(', ') + '</span>');
      }
      if (d.mode) tags.push('<span class="tag">' + d.mode + '</span>');
      if (d.agreement?.score != null) tags.push('<span class="tag">agreement ' + d.agreement.score + '</span>');
      const parts = [d.model, ...tags].filter(Boolean);
      return parts.length ? parts.join(' · ') : '';
    }

    async function loadHealth() {
      try {
        const r = await fetch('/health', { headers: headers() });
        const d = await r.json();
        const llm = d.llm_configured ? 'LLM on' : 'LLM off (set OPENAI_API_KEY)';
        const db = d.database_configured ? 'DB connected' : 'DB missing';
        const ts = d.latest_ts?.SPX || d.latest_ts?.[Object.keys(d.latest_ts||{})[0]] || '—';
        statusEl.textContent = `${db} · ${llm} · latest ${ts}`;
        if (!d.llm_configured) {
          warnEl.textContent = 'OPENAI_API_KEY is not set — agent cannot reply until you add it in Railway variables.';
        } else if (!d.database_configured) {
          warnEl.textContent = 'DATABASE_URL is not set — agent needs Postgres snapshot data.';
        } else {
          warnEl.textContent = '';
        }
        (d.supported_tickers || ['SPX']).forEach(t => {
          const o = document.createElement('option');
          o.value = t; o.textContent = t;
          tickerEl.appendChild(o);
        });
      } catch (e) {
        statusEl.textContent = 'Health check failed';
      }
    }

    async function loadPrompts() {
      try {
        const r = await fetch('/llm/prompts', { headers: headers() });
        const d = await r.json();
        (d.suggested_prompts || []).forEach(p => {
          const b = document.createElement('button');
          b.className = 'prompt-btn';
          b.textContent = p;
          b.onclick = () => { inputEl.value = p; inputEl.focus(); };
          promptsEl.appendChild(b);
        });
      } catch (_) {}
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      errorEl.textContent = '';
      inputEl.value = '';
      sendBtn.disabled = true;
      history.push({ role: 'user', content: text });
      addMessage('user', text);
      setThinking(true);

      const key = apiKeyEl.value.trim();
      if (key) localStorage.setItem('gex_api_key', key);

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), CHAT_TIMEOUT_MS);

      const useStream = streamEl.checked && modeEl.value === 'fast';

      try {
        if (useStream) {
          setThinking(true);
          const assistantDiv = addMessage('assistant', '', null, false);
          const textNode = assistantDiv.firstChild;
          let full = '';
          const r = await fetch(`/llm/chat/${tickerEl.value}`, {
            method: 'POST',
            headers: headers(),
            signal: controller.signal,
            body: JSON.stringify({
              messages: history,
              refresh_context: history.length <= 2,
              mode: modeEl.value,
              session_id: sessionId,
              stream: true,
            }),
          });
          setThinking(false);
          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            throw new Error(formatApiError(err.detail));
          }
          const reader = r.body.getReader();
          const decoder = new TextDecoder();
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            full += decoder.decode(value, { stream: true });
            textNode.textContent = full;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
          lastReply = full;
          history.push({ role: 'assistant', content: full });
          const metaEl = document.createElement('div');
          metaEl.className = 'msg-meta';
          metaEl.innerHTML = modeEl.value + ' · stream';
          assistantDiv.appendChild(metaEl);
          const fb = document.createElement('div');
          fb.className = 'feedback';
          const up = document.createElement('button');
          up.textContent = '👍';
          up.onclick = () => sendFeedback(1);
          const down = document.createElement('button');
          down.textContent = '👎';
          down.onclick = () => sendFeedback(-1);
          fb.appendChild(up);
          fb.appendChild(down);
          assistantDiv.appendChild(fb);
        } else {
        const r = await fetch(`/llm/chat/${tickerEl.value}`, {
          method: 'POST',
          headers: headers(),
          signal: controller.signal,
          body: JSON.stringify({
            messages: history,
            refresh_context: history.length <= 2,
            mode: modeEl.value,
            session_id: sessionId,
            stream: false,
          }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(formatApiError(d.detail));
        const reply = d.reply || 'No response.';
        lastReply = reply;
        lastSnapshotTs = d.context_summary?.snapshot_ts || null;
        history.push({ role: 'assistant', content: reply });
        addMessage('assistant', reply, formatMeta(d), true);
        if (d.context_summary?.snapshot_ts) {
          const base = statusEl.textContent.split(' · ctx ')[0];
          statusEl.textContent = `${base} · ctx ${d.context_summary.snapshot_ts}`;
        }
        }
      } catch (e) {
        const msg = e.name === 'AbortError'
          ? 'Request timed out after 2 minutes — the server may still be processing. Try again.'
          : e.message;
        errorEl.textContent = msg;
        addMessage('assistant', 'Sorry — ' + msg);
        history.pop();
      } finally {
        clearTimeout(timer);
        setThinking(false);
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.onclick = send;
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    apiKeyEl.value = localStorage.getItem('gex_api_key') || '';

    loadHealth();
    loadPrompts();
    addMessage('assistant', 'Hi — I analyze live GEX snapshots. Ask about regime, gamma flip, walls, or forecasts.');
  </script>
</body>
</html>
